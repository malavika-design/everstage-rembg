<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everstage Headshot Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Libre+Baskerville:ital,wght@0,700;1,400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --dark: #0A1628; --blue: #1B6BF5; --bg: #F4F6FA; --muted: #6B7A99; --r: 12px; --rlg: 20px; }
  body { font-family: "IBM Plex Sans", sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px 60px; }
  header { text-align: center; margin-bottom: 36px; }
  .logo { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--blue); }
  .brand { font-weight: 600; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  h1 { font-family: "Libre Baskerville", serif; font-size: clamp(20px, 4vw, 30px); font-weight: 700; line-height: 1.25; }
  h1 em { font-style: italic; color: var(--blue); }
  .sub { margin-top: 6px; font-size: 13px; color: var(--muted); }
  .card { background: white; border-radius: var(--rlg); padding: 28px; width: 100%; max-width: 540px; box-shadow: 0 2px 20px rgba(10,22,40,0.08); }
  .label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 22px 0 10px; }
  .label:first-child { margin-top: 0; }
  .upload-zone { border: 2px dashed #D0D8E8; border-radius: var(--r); padding: 32px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .upload-zone:hover { border-color: var(--blue); background: #F0F5FF; }
  .upload-zone.has-file { border-color: #16A34A; background: #F0FFF4; }
  .upload-icon { width: 40px; height: 40px; margin: 0 auto 10px; background: #EEF3FF; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--blue); }
  .upload-name { font-size: 14px; font-weight: 500; }
  .upload-hint { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .bg-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
  .swatch { aspect-ratio: 1; border-radius: 8px; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; background-size: cover; background-position: center; position: relative; overflow: hidden; }
  .swatch:hover { transform: scale(1.08); }
  .swatch.active { border-color: var(--dark); transform: scale(1.08); }
  .swatch.active::after { content: "✓"; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; background: rgba(0,0,0,0.2); }
  .btn { display: block; width: 100%; margin-top: 20px; padding: 13px; font-family: "IBM Plex Sans", sans-serif; font-size: 14px; font-weight: 600; border: none; border-radius: var(--r); cursor: pointer; transition: background 0.2s, opacity 0.2s; }
  .btn-primary { background: var(--dark); color: white; }
  .btn-primary:hover { background: #1B3A6B; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: #EEF3FF; color: var(--blue); margin-top: 10px; }
  .btn-secondary:hover { background: #dce8ff; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .preview-wrap { margin-top: 20px; border-radius: var(--r); overflow: hidden; background: #eee; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; }
  #outputCanvas { width: 100%; height: 100%; object-fit: contain; display: none; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; }
  .status { margin-top: 10px; font-size: 13px; text-align: center; min-height: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--muted); }
  .status.working { color: var(--blue); }
  .status.ok { color: #16A34A; }
  .status.err { color: #DC2626; }
  .spinner { width: 13px; height: 13px; border: 2px solid #D0D8E8; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 14px; line-height: 1.6; }
  .wake-notice { background: #FFF8E1; border: 1px solid #FFE082; border-radius: var(--r); padding: 10px 14px; font-size: 12px; color: #7B6000; margin-top: 14px; text-align: center; display: none; }
</style>
</head>
<body>
<header>
  <div class="logo"><div class="dot"></div><span class="brand">Everstage</span></div>
  <h1>Your <em>branded</em> headshot,<br>in seconds.</h1>
  <p class="sub">Upload a photo · pick a background · download.</p>
</header>
<div class="card">
  <div class="label">Your photo</div>
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <div class="upload-name" id="uploadName">Click to upload or drag &amp; drop</div>
    <div class="upload-hint">PNG or JPG · centred photo works best</div>
  </div>
  <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg" style="display:none">

  <div class="label">Background</div>
  <div class="bg-grid" id="bgGrid"></div>

  <button class="btn btn-primary" id="generateBtn" disabled>Generate headshot</button>

  <div class="preview-wrap">
    <div class="placeholder" id="placeholder">
      <svg width="30" height="30" fill="none" stroke="#C0CADB" stroke-width="1.5" viewBox="0 0 24 24">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>Preview will appear here</span>
    </div>
    <canvas id="outputCanvas"></canvas>
  </div>

  <div class="status" id="status"></div>
  <button class="btn btn-secondary" id="downloadBtn" disabled>Download headshot</button>
  <div class="wake-notice" id="wakeNotice">⏳ Server is waking up — this takes ~30s after a period of inactivity. Hang tight.</div>
</div>

let selectedBgSrc = BACKGROUNDS[0].src;
let uploadedFile = null;

// Build swatches
const bgGrid = document.getElementById("bgGrid");
BACKGROUNDS.forEach((bg, i) => {
  const el = document.createElement("div");
  el.className = "swatch" + (i === 0 ? " active" : "");
  el.style.backgroundImage = `url(${bg.src})`;
  el.addEventListener("click", () => {
    document.querySelectorAll(".swatch").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    selectedBgSrc = bg.src;
  });
  bgGrid.appendChild(el);
});

// Upload
const uploadZone = document.getElementById("uploadZone");
const fileInput = document.getElementById("fileInput");
uploadZone.addEventListener("click", () => fileInput.click());
uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag-over"); });
uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag-over"));
uploadZone.addEventListener("drop", e => {
  e.preventDefault();
  uploadZone.classList.remove("drag-over");
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener("change", e => { if (e.target.files[0]) setFile(e.target.files[0]); });

function setFile(file) {
  uploadedFile = file;
  uploadZone.classList.add("has-file");
  document.getElementById("uploadName").textContent = file.name;
  document.getElementById("generateBtn").disabled = false;
}

// Generate
document.getElementById("generateBtn").addEventListener("click", async () => {
  if (!uploadedFile) return;
  setStatus("working", "Removing background...");
  document.getElementById("generateBtn").disabled = true;
  document.getElementById("downloadBtn").disabled = true;

  // Show wake notice after 5s in case server is cold
  const wakeTimer = setTimeout(() => {
    document.getElementById("wakeNotice").style.display = "block";
  }, 5000);

  try {
    const formData = new FormData();
    formData.append("file", uploadedFile);

    const res = await fetch(API_URL, { method: "POST", body: formData });
    clearTimeout(wakeTimer);
    document.getElementById("wakeNotice").style.display = "none";

    if (!res.ok) throw new Error(`Server error ${res.status}`);

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      renderComposite(img);
      URL.revokeObjectURL(url);
      setStatus("ok", "Done — download when ready.");
      document.getElementById("generateBtn").disabled = false;
      document.getElementById("downloadBtn").disabled = false;
    };
    img.src = url;

  } catch (err) {
    clearTimeout(wakeTimer);
    document.getElementById("wakeNotice").style.display = "none";
    console.error(err);
    setStatus("err", "Something went wrong. Try again.");
    document.getElementById("generateBtn").disabled = false;
  }
});

function renderComposite(subjectImg) {
  const size = Math.min(subjectImg.width, subjectImg.height);
  const ox = (subjectImg.width - size) / 2;
  const oy = (subjectImg.height - size) / 2;
  const canvas = document.getElementById("outputCanvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  const bgImg = new Image();
  bgImg.onload = () => {
    ctx.drawImage(bgImg, 0, 0, size, size);
    ctx.drawImage(subjectImg, -ox, -oy, subjectImg.width, subjectImg.height);
    canvas.style.display = "block";
    document.getElementById("placeholder").style.display = "none";
  };
  bgImg.src = selectedBgSrc;
}

document.getElementById("downloadBtn").addEventListener("click", () => {
  const canvas = document.getElementById("outputCanvas");
  const a = document.createElement("a");
  a.download = "everstage-headshot.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
});

function setStatus(type, msg) {
  const el = document.getElementById("status");
  el.className = "status " + type;
  el.innerHTML = type === "working" ? `<div class="spinner"></div>${msg}` : msg;
}
</script>
